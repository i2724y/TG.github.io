<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    
    <!-- === ОСНОВНЫЕ НАСТРОЙКИ ДЛЯ TELEGRAM === -->
    <!-- Заголовок твоей "фотографии"-визитки -->
    <meta property="og:title" content="Moriarty | Python Dev">
    <!-- Текст под заголовком -->
    <meta property="og:description" content="No premium clear python code!!!">
    
    <!-- === ГЛАВНЫЙ СЕКРЕТ: ССЫЛКА НА ТВОЮ КАРТИНКУ === -->
    <!-- Вставь сюда прямую ссылку на изображение (желательно 1200x630 пикселей) -->
    <meta property="og:image" content="https://drive.google.com/thumbnail?id=1ecL34iKp07dMAC4r8x7QLkmN8q9jf9qj&sz=w1000">
    
    <!-- === ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ (ДЛЯ ПРОДВИНУТЫХ) === -->
    <!-- Гарантирует, что превью будет с большой картинкой, а не с маленькой иконкой -->
    <meta name="twitter:card" content="summary_large_image">
</head>
<body>
    <!-- Этот текст увидят только те, кто перейдёт по ссылке -->
    <h1>Привет! Это моя страница-визитка для Telegram.</h1>
</body>
</html>
